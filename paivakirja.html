<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miten menee? - Päiväkirja</title>
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="src/css/diary-card.css">
</head>
<body>
<div class="sivun-raamit">
    <nav>
        <div class="keskitetty-alue">
            <ul>
                <li class="brand">Miten menee?</li>
                <li><a href="index.html">Koti</a></li>
                <li><a href="bmi.html">BMI-laskuri</a></li>
                <li><a href="paivakirja.html">Päiväkirja</a></li>
                <li><a href="verenpaine.html">Verenpaine</a></li>
                <li><a href="login.html">Kirjaudu</a></li>
                <li><button class="logout-btn" id="logoutBtn">Kirjaudu ulos</button></li>
            </ul>
            <div class="nav-user">Hei, <span class="username">Vieras</span></div>
        </div>
    </nav>

    <main class="keskitetty-alue">

        <section class="diary-header">
            <h1>Päiväkirja</h1>
            <button class="get_entries">Hae merkinnät</button>
            <button class="add_entry_btn">+ Uusi merkintä</button>
        </section>

        <!-- Uuden merkinnän lomake (piilotettu oletuksena) -->
        <section class="add-entry-form" id="addEntryForm" style="display:none;">
            <h2>Lisää uusi merkintä</h2>
            <form class="entryForm">
                <label for="entry_date">Päivämäärä</label>
                <input type="date" id="entry_date" name="entry_date" required />

                <label for="mood">Mieliala</label>
                <input type="text" id="mood" name="mood" placeholder="esim. iloinen" />

                <label for="weight">Paino (kg)</label>
                <input type="number" id="weight" name="weight" placeholder="esim. 70" step="0.1" />

                <label for="sleep_hours">Unitunnit</label>
                <input type="number" id="sleep_hours" name="sleep_hours" placeholder="esim. 8" />

                <label for="notes">Muistiinpanot</label>
                <textarea id="notes" name="notes" placeholder="Kirjoita päivästäsi..."></textarea>

                <button type="submit">Tallenna</button>
                <button type="button" id="cancelEntry">Peruuta</button>
            </form>
            <div id="entryMessage"></div>
        </section>

        <!-- Kortit -->
        <section class="diary-card-area">
        </section>

    </main>
</div>

<footer>
    <p>Copyright by Hege 2026</p>
</footer>

<!-- Dialog merkinnän muokkaamiseen -->
<dialog class="diary_dialog">
    <h2>Muokkaa merkintää</h2>
    <form class="editForm">
        <input type="hidden" id="editId" />

        <label for="editDate">Päivämäärä</label>
        <input type="date" id="editDate" name="entry_date" />

        <label for="editMood">Mieliala</label>
        <input type="text" id="editMood" name="mood" />

        <label for="editWeight">Paino (kg)</label>
        <input type="number" id="editWeight" name="weight" step="0.1" />

        <label for="editSleep">Unitunnit</label>
        <input type="number" id="editSleep" name="sleep_hours" />

        <label for="editNotes">Muistiinpanot</label>
        <textarea id="editNotes" name="notes"></textarea>

        <button type="submit">Tallenna muutokset</button>
        <button type="button" id="closeDialog">Sulje</button>
    </form>
    <div id="editMessage"></div>
</dialog>

<script type="module" src="/src/js/entries.js"></script>
<script type="module" src="/src/js/loggedUser.js"></script>
</body>
</html>

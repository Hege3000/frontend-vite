<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miten menee? - Verenpaine</title>
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="src/css/verenpaine.css">
</head>
<body>
<div class="sivun-raamit">
    <nav>
        <div class="keskitetty-alue">
            <ul>
                <li class="brand">Miten menee?</li>
                <li><a href="index.html">Koti</a></li>
                <li><a href="bmi.html">BMI-laskuri</a></li>
                <li><a href="paivakirja.html">Päiväkirja</a></li>
                <li><a href="verenpaine.html">Verenpaine</a></li>
                <li><a href="login.html">Kirjaudu</a></li>
                <li><button class="logout-btn" id="logoutBtn">Kirjaudu ulos</button></li>
            </ul>
            <div class="nav-user">Hei, <span class="username">Vieras</span></div>
        </div>
    </nav>

    <main class="keskitetty-alue">

        <section class="bp-header">
            <h1>Verenpainemittaukset</h1>
            <button class="get_bp">Hae mittaukset</button>
            <button class="add_bp_btn">+ Uusi mittaus</button>
        </section>

        <!-- Päivämääräsuodatus -->
        <section class="bp-filter">
            <h3>Suodata päivämäärän mukaan</h3>
            <div class="filter-row">
                <label for="filterFrom">Alkaen:</label>
                <input type="date" id="filterFrom" />
                <label for="filterTo">Päättyen:</label>
                <input type="date" id="filterTo" />
                <button id="filterBtn">Hae</button>
                <button id="clearFilterBtn">Tyhjennä</button>
            </div>
        </section>

        <!-- Uuden mittauksen lomake -->
        <section class="add-bp-form" id="addBpForm" style="display:none;">
            <h2>Lisää uusi mittaus</h2>
            <form class="bpForm">
                <label for="systolic">Systolinen (yläpaine):</label>
                <input type="number" id="systolic" name="systolic" placeholder="esim. 120" required />

                <label for="diastolic">Diastolinen (alapaine):</label>
                <input type="number" id="diastolic" name="diastolic" placeholder="esim. 80" required />

                <label for="pulse">Pulssi (lyöntiä/min):</label>
                <input type="number" id="pulse" name="pulse" placeholder="esim. 70" />

                <label for="measured_at">Mittausaika:</label>
                <input type="datetime-local" id="measured_at" name="measured_at" />

                <label for="notes">Muistiinpanot:</label>
                <textarea id="notes" name="notes" placeholder="esim. levossa mitattu"></textarea>

                <button type="submit">Tallenna</button>
                <button type="button" id="cancelBp">Peruuta</button>
            </form>
            <div id="bpMessage"></div>
        </section>

        <!-- Kortit -->
        <section class="bp-card-area">
        </section>

    </main>
</div>

<footer>
    <p>Copyright by Hege 2026</p>
</footer>

<!-- Dialog muokkausta varten -->
<dialog class="bp_dialog">
    <h2>Muokkaa mittausta</h2>
    <form class="editBpForm">
        <input type="hidden" id="editBpId" />

        <label for="editSystolic">Systolinen (yläpaine):</label>
        <input type="number" id="editSystolic" name="systolic" />

        <label for="editDiastolic">Diastolinen (alapaine):</label>
        <input type="number" id="editDiastolic" name="diastolic" />

        <label for="editPulse">Pulssi:</label>
        <input type="number" id="editPulse" name="pulse" />

        <label for="editMeasuredAt">Mittausaika:</label>
        <input type="datetime-local" id="editMeasuredAt" name="measured_at" />

        <label for="editNotes">Muistiinpanot:</label>
        <textarea id="editNotes" name="notes"></textarea>

        <button type="submit">Tallenna muutokset</button>
        <button type="button" id="closeBpDialog">Sulje</button>
    </form>
    <div id="editBpMessage"></div>
</dialog>

<script type="module" src="/src/js/bloodpressure.js"></script>
<script type="module" src="/src/js/loggedUser.js"></script>
</body>
</html>
